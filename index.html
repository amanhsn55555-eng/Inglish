<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>تعلم اللغة الإنجليزية لكبار السن في العراق - منصة إنجلش للدراسة أونلاين</title>
    <meta name="description" content="منصة تعلم اللغة الإنجليزية المتخصصة لكبار السن في العراق. دراسة انكليزية سهلة ومبسطة مع دروس تفاعلية.">
    
    <style>
        :root {
            --bg: #f0f4f8;
            --bg2: #e2e8f0;
            --card: #ffffff;
            --text: #1e293b;
            --primary: #4f46e5;
            --primary-light: #eef2ff;
            --border: #e2e8f0;
            --shadow-light: #ffffff;
            --shadow-dark: #94a3b8;
            --radius: 20px;
            --example-bg: #f8fafc;
            --example-border: #4f46e5;
            --score-bg: #fef9c3;
            --font-control-bg: #f1f5f9;
            --speak-btn-bg: #eef2ff;
            --speak-btn-hover: #dbeafe;
            --option-hover-bg: #f1f5f9;
            --correct-bg: #d1fae5;
            --wrong-bg: #fee2e2;
            --overlay-bg: rgba(0,0,0,0.6);
            --modal-bg: #ffffff;
            --separator-color: #94a3b8;
            --translation-color: #475569;
            --word-color: #4f46e5;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: linear-gradient(145deg, var(--bg), var(--bg2)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            direction: rtl;
            font-size: 18px;
            line-height: 1.6;
            color: var(--text);
            min-height: 100vh;
        }
        
        .container {
            background: linear-gradient(145deg, var(--bg), var(--bg2)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .top-bar {
            background: linear-gradient(145deg, var(--bg), var(--bg2)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            margin-bottom: 30px;
        }

        .user-icon {
            background: linear-gradient(145deg, var(--bg), var(--bg2)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid var(--primary);
            transition: transform 0.2s;
        }

        .user-icon:hover { transform: scale(1.1); }

        .score-badge {
            background: linear-gradient(145deg, var(--score-bg), color-mix(in srgb, var(--score-bg) 80%, #d97706)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 14px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            white-space: nowrap;
            color: var(--text);
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            text-decoration: none;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { filter: brightness(1.15); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 3px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary-light); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { filter: brightness(1.15); }
        .btn-sm { padding: 10px 20px; font-size: 1rem; }
        .btn-lg { padding: 16px 32px; font-size: 1.2rem; }
        
        h1 { text-align: center; margin-bottom: 35px; font-size: 2.5rem; font-weight: 800; color: var(--text); }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .container { padding: 15px; }
            h1 { font-size: 2rem; }
            .section-top-bar { flex-direction: column; text-align: center; }
            .section-top-bar .title-area { flex-direction: column; }
            .controls-bar { flex-direction: column; }
            .search-box { width: 100%; }
            .post-word { font-size: 1.5rem; }
            .quiz-options { grid-template-columns: 1fr; }
        }
        
        .section-card {
            background: linear-gradient(145deg, var(--card), color-mix(in srgb, var(--card) 90%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 30px;
            transition: all 0.3s;
            border: 3px solid transparent;
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .section-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .section-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 20px; }
        .section-card h3 { font-size: 1.5rem; font-weight: 800; color: var(--text); }
        
        .section-score {
            background: linear-gradient(145deg, var(--score-bg), color-mix(in srgb, var(--score-bg) 80%, #d97706)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }
        
        .section-page { display: none; }
        .section-page.active { display: block; }
        
        .section-top-bar {
            background: linear-gradient(145deg, var(--card), color-mix(in srgb, var(--card) 90%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .section-top-bar .title-area { display: flex; align-items: center; gap: 15px; }
        .section-top-bar img { width: 65px; height: 65px; border-radius: 16px; object-fit: cover; }
        .section-top-bar h2 { font-size: 1.8rem; font-weight: 800; color: var(--text); }
        
        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            background: linear-gradient(145deg, var(--card), color-mix(in srgb, var(--card) 90%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            flex: 1;
            min-width: 200px;
            padding: 16px 20px;
            font-size: 1.1rem;
            color: var(--text);
        }
        
        .search-box:focus { outline: none; }
        
        .posts-container { display: flex; flex-direction: column; gap: 20px; }
        
        .post {
            background: linear-gradient(145deg, var(--card), color-mix(in srgb, var(--card) 90%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 30px;
            transition: all 0.3s;
        }
        
        .post:hover { border-color: #cbd5e1; }
        
        .post-words-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .post-word {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--word-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .speak-btn {
            cursor: pointer;
            font-size: 1.4rem;
            background: linear-gradient(145deg, var(--speak-btn-bg), color-mix(in srgb, var(--speak-btn-bg) 80%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 12px;
            border-radius: 50%;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
        }
        
        .speak-btn:hover { background: var(--speak-btn-hover); transform: scale(1.15); }
        .speak-btn:active { transform: scale(0.95); }
        
        .word-separator { font-size: 2.2rem; font-weight: 900; color: var(--separator-color); }
        
        .post-translation {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--translation-color);
            text-align: center;
            margin-bottom: 15px;
        }
        
        .post-example-box {
            background: linear-gradient(145deg, var(--example-bg), color-mix(in srgb, var(--example-bg) 80%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 20px 25px;
            border-right: 6px solid var(--example-border);
            margin: 20px 0;
        }
        
        .post-example-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .post-example-trans { font-size: 1.2rem; font-weight: 600; color: var(--translation-color); }
        
        .post-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        
        .font-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(145deg, var(--font-control-bg), color-mix(in srgb, var(--font-control-bg) 80%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 12px 20px;
            border-radius: 50px;
        }
        
        .font-control button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #64748b;
            background: white;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .font-control button:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .font-control input[type="range"] { width: 150px; height: 8px; cursor: pointer; accent-color: var(--primary); }
        .font-size-label { font-weight: 700; font-size: 1rem; min-width: 40px; text-align: center; }
        
        .quiz-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            padding: 20px;
        }
        
        .quiz-content {
            background: linear-gradient(145deg, var(--modal-bg), color-mix(in srgb, var(--modal-bg) 90%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 35px;
            width: 100%;
            max-width: 750px;
            max-height: 90vh;
            overflow-y: auto;
            font-size: 1.3rem;
            color: var(--text);
        }
        
        .quiz-content h3 { font-size: 1.8rem; margin-bottom: 20px; text-align: center; }
        .quiz-question { font-size: 1.6rem; font-weight: 800; margin-bottom: 25px; text-align: center; }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        @media (max-width: 500px) { .quiz-options { grid-template-columns: 1fr; } }
        
        .quiz-option {
            padding: 20px;
            border: 3px solid var(--border);
            border-radius: 18px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.2s;
            text-align: center;
            background: linear-gradient(145deg, var(--card), color-mix(in srgb, var(--card) 90%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            color: var(--text);
        }
        
        .quiz-option:hover { background: var(--option-hover-bg); }
        .quiz-option.correct { background: var(--correct-bg) !important; }
        .quiz-option.wrong { background: var(--wrong-bg) !important; }
        
        .quiz-media { max-width: 100%; max-height: 300px; border-radius: 16px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
        .no-posts { font-size: 1.5rem; color: #94a3b8; text-align: center; padding: 60px 20px; }
        .hidden { display: none !important; }

        .color-panel {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            background: linear-gradient(145deg, var(--card), color-mix(in srgb, var(--card) 90%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.2), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 20px;
            z-index: 999;
            width: 280px;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
        }
        
        .color-panel.open { display: block; }
        
        .color-panel h3 { text-align: center; margin-bottom: 15px; font-size: 1.3rem; color: var(--text); }
        
        .color-panel label { display: block; font-weight: 700; margin-top: 12px; font-size: 0.95rem; color: var(--text); }
        
        .color-panel input[type="color"] {
            width: 100%;
            height: 40px;
            border: 2px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            margin-top: 5px;
            padding: 3px;
        }
        
        .color-toggle-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--primary), color-mix(in srgb, var(--primary) 80%, #1e3a5f)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.3), inset -2px -2px 5px rgba(0,0,0,0.2), 3px 3px 8px rgba(0,0,0,0.3), -1px -1px 4px rgba(255,255,255,0.3) !important;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 998;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .color-toggle-btn:hover { transform: scale(1.1); }
        .color-panel .btn { margin-top: 10px; width: 100%; font-size: 0.9rem; }

        .account-page { display: none; max-width: 800px; margin: 0 auto; }
        .account-page.active { display: block; }
        
        .profile-card {
            background: linear-gradient(145deg, var(--card), color-mix(in srgb, var(--card) 90%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 5px solid var(--primary); margin-bottom: 20px; }
        
        .chart-container {
            background: linear-gradient(145deg, var(--card), color-mix(in srgb, var(--card) 90%, #94a3b8)) !important;
            border: none !important;
            box-shadow: inset 2px 2px 5px var(--shadow-light), inset -2px -2px 5px var(--shadow-dark), 3px 3px 8px rgba(0,0,0,0.1), -1px -1px 4px rgba(255,255,255,0.6) !important;
            border-radius: 30px;
            padding: 30px;
            margin-top: 30px;
        }
        
        canvas { max-width: 100%; height: auto; }
        
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, var(--bg), var(--bg2));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* أنماط الوسائط في المنشورات */
        .post-media-container {
            margin: 20px 0;
            text-align: center;
        }

        .post-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 16px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s;
            border: 3px solid var(--border);
        }

        .post-image:hover {
            transform: scale(1.02);
            border-color: var(--primary);
        }

        .post-video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            max-width: 100%;
            border-radius: 16px;
            border: 3px solid var(--border);
            margin: 20px 0;
        }

        .post-video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 16px;
        }

        .media-type-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .badge-image { background: #d1fae5; color: #065f46; }
        .badge-video { background: #fce7f3; color: #9d174d; }

        /* Lightbox للصور */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            cursor: pointer;
        }

        .lightbox img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 10px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }
        
        @media (max-width: 480px) {
            .post-word { font-size: 1.6rem; }
            .post-translation { font-size: 1.3rem; }
            .post-example-text { font-size: 1.1rem; }
            .font-control input[type="range"] { width: 100px; }
            .btn { padding: 12px 20px; font-size: 1rem; }
            .color-panel { width: 250px; right: 5px; }
        }
    .top-bar { position: sticky; top: 0; z-index: 100; }
    </style>
</head>
<body>

<!-- Lightbox -->
<div id="lightbox" class="lightbox hidden" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="">
</div>

    { id: 'sec7', name: 'السفر', image: 'https://iili.io/B6PCmdJ.jpg' },
    { id: 'sec8', name: 'التسوق', image: 'https://iili.io/B6Pf6bI.jpg' },
    { id: 'sec9', name: 'التواصل', image: 'https://iili.io/B6Pnfgs.jpg' },

  ];

  const defaultColors = {
    bg: '#f0f4f8',

    word: '#4f46e5',
    separator: '#94a3b8',
    translation: '#475569',
    speakBg: '#eef2ff',
    speakHover: '#dbeafe',
    optionHover: '#f1f5f9',
    correctBg: '#d1fae5',

    modalBg: '#ffffff'
  };

  let currentUser = null;
  let currentSections = [...defaultSections];
  let currentSectionId = null;
  let quizActive = false;
  let resultsChart = null;

  function loadSavedColors() {
    const saved = localStorage.getItem('appColors');
    if (saved) {
      const colors = JSON.parse(saved);
      Object.keys(colors).forEach(key => {
        document.documentElement.style.setProperty(`--${key}`, colors[key]);
        const input = document.getElementById(`color${key.charAt(0).toUpperCase() + key.slice(1)}`);
        if (input) input.value = colors[key];
      });
    }
  }

  loadSavedColors();

  window.toggleColorPanel = () => {
    document.getElementById('colorPanel').classList.toggle('open');
  };

    
  window.updateColors = () => {
    const colors = {
      bg: document.getElementById('colorBg').value,
      bg2: document.getElementById('colorBg2').value,
      card: document.getElementById('colorCard').value,
      text: document.getElementById('colorText').value,
      primary: document.getElementById('colorPrimary').value,
      primaryLight: document.getElementById('colorPrimaryLight').value,
      shadowLight: document.getElementById('colorShadowLight').value,
      shadowDark: document.getElementById('colorShadowDark').value,
      exampleBg: document.getElementById('colorExampleBg').value,
      exampleBorder: document.getElementById('colorExampleBorder').value,
      scoreBg: document.getElementById('colorScoreBg').value,
      fontControlBg: document.getElementById('colorFontControlBg').value,
      word: document.getElementById('colorWord').value,
      separator: document.getElementById('colorSeparator').value,
      translation: document.getElementById('colorTranslation').value,
      speakBg: document.getElementById('colorSpeakBg').value,
      speakHover: document.getElementById('colorSpeakHover').value,
      optionHover: document.getElementById('colorOptionHover').value,

      wrongBg: document.getElementById('colorWrongBg').value,
      modalBg: document.getElementById('colorModalBg').value
    };
    
    Object.keys(colors).forEach(key => {
      document.documentElement.style.setProperty(`--${key}`, colors[key]);
    });
    
    localStorage.setItem('appColors', JSON.stringify(colors));
  };

  window.resetColors = () => {
    Object.keys(defaultColors).forEach(key => {
      document.documentElement.style.setProperty(`--${key}`, defaultColors[key]);
      const input = document.getElementById(`color${key.charAt(0).toUpperCase() + key.slice(1)}`);
      if (input) input.value = defaultColors[key];
    });
    localStorage.removeItem('appColors');
  };

  window.openLightbox = (imageUrl) => {
    document.getElementById('lightboxImg').src = imageUrl;
    document.getElementById('lightbox').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  };

  window.closeLightbox = () => {
    document.getElementById('lightbox').classList.add('hidden');
    document.body.style.overflow = '';
  };

  function getYouTubeId(url) {
    if (!url) return null;
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\s]+)/,
      /youtube\.com\/watch\?.*v=([^&\s]+)/
    ];
    for (let pattern of patterns) {
      const match = url.match(pattern);
      if (match) return match[1];
    }
    return null;
  }

  async function initializeUser(user) {
    if (!user) {
      window.location.href = 'index.html';
      return;
    }
    
    currentUser = user;
    
    const userNameDisplay = document.getElementById('userNameDisplay');
    const userAvatarSmall = document.getElementById('userAvatarSmall');
    
    if (userAvatarSmall) {
      userAvatarSmall.src = user.photoURL || DEFAULT_AVATAR;
    }
    
    if (userNameDisplay) {
      userNameDisplay.textContent = user.displayName || user.email || 'مستخدم';
    }
    
    const userRef = doc(db, 'users', currentUser.uid);
    const userSnap = await getDoc(userRef);
    
    if (userSnap.exists()) {
      const data = userSnap.data();
      if (data.sections) currentSections = data.sections;
      if (data.avatar && userAvatarSmall) {
        userAvatarSmall.src = data.avatar;
      }
      if (data.name && userNameDisplay) {
        userNameDisplay.textContent = data.name;
      }
    } else {
      await setDoc(userRef, {
        email: currentUser.email || '',
        name: currentUser.displayName || 'مستخدم',
        avatar: currentUser.photoURL || DEFAULT_AVATAR,
        sections: defaultSections,
        createdAt: new Date()
      });
    }
    
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainContainer').style.display = 'block';
    
    await updateAverageScore();
    renderHomeSections();
  }

  onAuthStateChanged(auth, async (user) => {
    console.log('حالة المصادقة:', user ? 'مسجل دخول' : 'غير مسجل');
    
    if (user) {
      await initializeUser(user);
    } else {
      window.location.href = 'index.html';
    }
  });

  async function updateAverageScore() {
    let totalScore = 0, count = 0;
    for (let sec of currentSections) {
      const q = query(collection(db, 'sections', sec.id, 'quizResults'), orderBy('timestamp', 'desc'));
      const snap = await getDocs(q);
      snap.forEach(doc => { totalScore += doc.data().score; count++; });
    }
    document.getElementById('avgScore').textContent = (count > 0 ? (totalScore / count).toFixed(1) : '--') + '%';
  }

  async function getSectionScore(sectionId) {
    const q = query(collection(db, 'sections', sectionId, 'quizResults'), orderBy('timestamp', 'desc'));
    const snap = await getDocs(q);
    return snap.empty ? null : snap.docs[0].data().score;
  }

  function scoreLabel(score) {
    if (score === null || score === undefined) return 'لم يختبر بعد';
    if (score >= 90) return '🌟 ممتاز';
    if (score >= 70) return '👑 جيد جداً';
    if (score >= 50) return '👍 جيد';
    if (score >= 30) return '⚠️ مقبول';
    return '❌ سيئ';
  }

  async function renderHomeSections() {
    const grid = document.getElementById('sectionsGrid');
    grid.innerHTML = '';
    for (let sec of currentSections) {
      const score = await getSectionScore(sec.id);
      const card = document.createElement('div');
      card.className = 'section-card';
      card.onclick = () => openSection(sec.id);
      card.innerHTML = `
        <img src="${sec.image}" alt="${sec.name}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
        <h3>${sec.name}</h3>
        <div class="section-score">${scoreLabel(score)} ${score !== null ? `(${score}%)` : ''}</div>
      `;
      grid.appendChild(card);
    }
  }

  window.openSection = async (sectionId) => {
    currentSectionId = sectionId;
    const sec = currentSections.find(s => s.id === sectionId);
    document.getElementById('homePage').style.display = 'none';
    document.getElementById('accountPage').classList.remove('active');
    const page = document.getElementById('sectionPage');
    page.classList.add('active');
    document.getElementById('sectionPageImg').src = sec.image;
    document.getElementById('sectionPageImg').onerror = function() { this.src = 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'; };
    document.getElementById('sectionPageTitle').textContent = sec.name;
    const score = await getSectionScore(sectionId);
    document.getElementById('sectionPageScore').textContent = `${scoreLabel(score)} ${score !== null ? `(${score}%)` : ''}`;
    document.getElementById('quizBtn').onclick = () => startQuiz(sectionId);
    document.getElementById('searchInput').value = '';
    loadPosts();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.goHome = () => {
    document.getElementById('sectionPage').classList.remove('active');
    document.getElementById('accountPage').classList.remove('active');
    document.getElementById('homePage').style.display = 'block';
    currentSectionId = null;
    renderHomeSections();
    updateAverageScore();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.openAccountPage = async () => {
    document.getElementById('homePage').style.display = 'none';
    document.getElementById('sectionPage').classList.remove('active');
    document.getElementById('accountPage').classList.add('active');
    
    const profileAvatar = document.getElementById('profileAvatar');
    if (currentUser) {
      profileAvatar.src = currentUser.photoURL || DEFAULT_AVATAR;
      document.getElementById('profileName').textContent = currentUser.displayName || 'مستخدم';
      document.getElementById('profileEmail').textContent = currentUser.email || '';
    }
    
    const userRef = doc(db, 'users', currentUser.uid);
    const userSnap = await getDoc(userRef);
    if (userSnap.exists()) {
      const data = userSnap.data();
      if (data.avatar) profileAvatar.src = data.avatar;
      if (data.name) document.getElementById('profileName').textContent = data.name;
    }
    
    await loadChart();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.closeAccountPage = () => {
    document.getElementById('accountPage').classList.remove('active');
    document.getElementById('homePage').style.display = 'block';
    renderHomeSections();
    updateAverageScore();
  };

  window.editProfileName = async () => {
    const newName = prompt('الرجاء إدخال الاسم الجديد:', document.getElementById('profileName').textContent);
    if (newName && newName.trim()) {
      await updateDoc(doc(db, 'users', currentUser.uid), { name: newName.trim() });
      document.getElementById('profileName').textContent = newName.trim();
      document.getElementById('userNameDisplay').textContent = newName.trim();
    }
  };

  window.updateAvatar = async (event) => {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      document.getElementById('profileAvatar').src = e.target.result;
      document.getElementById('userAvatarSmall').src = e.target.result;
      await updateDoc(doc(db, 'users', currentUser.uid), { avatar: e.target.result });
    };
    reader.readAsDataURL(file);
  };

  async function loadChart() {
    const allResults = [];
    for (let sec of currentSections) {
      const snap = await getDocs(query(collection(db, 'sections', sec.id, 'quizResults'), orderBy('timestamp', 'asc')));
      snap.forEach(doc => {
        const data = doc.data();
        allResults.push({ section: sec.name, score: data.score, timestamp: data.timestamp?.toDate() || new Date() });
      });
    }
    allResults.sort((a, b) => a.timestamp - b.timestamp);
    const labels = allResults.map(r => `${r.timestamp.getDate()}/${r.timestamp.getMonth()+1}/${r.timestamp.getFullYear()}`);
    const scores = allResults.map(r => r.score);
    const totalAvg = scores.length > 0 ? (scores.reduce((a,b) => a+b, 0) / scores.length).toFixed(1) : 0;
    let levelText = totalAvg >= 90 ? '🏆 المستوى المتقدم' : totalAvg >= 70 ? '🥇 مستوى جيد جداً' : totalAvg >= 50 ? '🥈 مستوى متوسط' : totalAvg >= 30 ? '🥉 مستوى مقبول' : '📚 مستوى مبتدئ';
    document.getElementById('chartLevel').textContent = `${levelText} - المتوسط العام: ${totalAvg}%`;
    const ctx = document.getElementById('resultsChart').getContext('2d');
    if (resultsChart) resultsChart.destroy();
    if (scores.length === 0) { document.getElementById('chartLevel').textContent = 'لا توجد بيانات اختبارات بعد'; return; }
    resultsChart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{ label: 'نتيجة الاختبار (%)', data: scores, borderColor: '#4f46e5', backgroundColor: 'rgba(79,70,229,0.1)', borderWidth: 3, pointBackgroundColor: '#4f46e5', pointRadius: 6, pointHoverRadius: 8, fill: true, tension: 0.4 }] },
      options: { responsive: true, plugins: { legend: { display: true, labels: { font: { size: 14 } } } }, scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } } }
    });
  }

window.startQuiz = async (sectionId) => {
    if (quizActive) return;
    
    const q = query(collection(db, 'sections', sectionId, 'questions'));
    const snap = await getDocs(q);
    
    if (snap.empty) {
      alert('⚠️ لا توجد أسئلة في هذا القسم بعد.');
      return;
    }
    
    let allQuestions = [];
    snap.forEach(docSnap => {
      allQuestions.push({ id: docSnap.id, ...docSnap.data() });
    });
    
    allQuestions = shuffleArray(allQuestions);
    const selectedQuestions = allQuestions.slice(0, Math.min(10, allQuestions.length));
    
    quizActive = true;
    let currentQ = 0;
    let score = 0;
    
    const modal = document.getElementById('quizModal');
    const content = document.getElementById('quizContent');
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';

function showQuestion() {
  if (currentQ >= selectedQuestions.length) {
    return showResult();
  }
  
  const qData = selectedQuestions[currentQ];
  const shuffledIndices = shuffleArray([0, 1, 2, 3]);
  const correctAnswer = shuffledIndices.indexOf(qData.answer);
  
  window._currentQuestionData = { qData, correctAnswer, total: selectedQuestions.length };
  
  let mediaHTML = '';
  if (qData.mediaUrl && qData.type !== 'text') {
    if (qData.type === 'audio') {
      mediaHTML = `<audio controls style="width:100%;margin-bottom:15px;"><source src="${qData.mediaUrl}" type="audio/mpeg"></audio>`;
    } else if (qData.type === 'image') {
      mediaHTML = `<img class="quiz-media" src="${qData.mediaUrl}" alt="صورة السؤال" onerror="this.style.display='none'">`;
    } else if (qData.type === 'video') {
      const vId = getYouTubeId(qData.mediaUrl);
      if (vId) {
        mediaHTML = `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;max-width:100%;border-radius:16px;margin-bottom:20px;"><iframe src="https://www.youtube.com/embed/${vId}" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:16px;" frameborder="0" allowfullscreen></iframe></div>`;
      }
    }
  }
  
  content.innerHTML = `
    <h3>📝 سؤال ${currentQ + 1} من ${selectedQuestions.length}</h3>
    ${mediaHTML}
    <div class="quiz-question">${escapeHTML(qData.question)}</div>
    <div class="quiz-options">
      ${shuffledIndices.map((origIdx, i) => `
        <div class="quiz-option" onclick="selectQuizAnswer(${i})">
          ${escapeHTML(qData.options[origIdx])}
        </div>
      `).join('')}
    </div>
  `;
}
    window.selectQuizAnswer = (selectedIdx) => {
      if (!quizActive || !window._currentQuestionData) return;
      
      const { correctAnswer } = window._currentQuestionData;
      const options = content.querySelectorAll('.quiz-option');
      
      options.forEach((opt, i) => {
        opt.style.pointerEvents = 'none';
        if (i === correctAnswer) opt.classList.add('correct');
        if (i === selectedIdx && selectedIdx !== correctAnswer) opt.classList.add('wrong');
      });
      
      if (selectedIdx === correctAnswer) score++;
      
      setTimeout(() => {
        currentQ++;
        if (currentQ < selectedQuestions.length) {
          showQuestion();
        } else {
          showResult();
        }
      }, 1500);
    };

    async function showResult() {
      quizActive = false;
      const finalScore = Math.round((score / selectedQuestions.length) * 100);
      const label = scoreLabel(finalScore);
      
      try {
        await setDoc(doc(collection(db, 'sections', sectionId, 'quizResults')), {
          score: finalScore,
          total: selectedQuestions.length,
          timestamp: new Date()
        });
      } catch (error) {
        console.error('خطأ في حفظ النتيجة:', error);
      }
      
      content.innerHTML = `
        <h3>🎉 انتهى الاختبار!</h3>
        <div style="text-align:center;padding:30px;">
          <p style="font-size:2.5rem;font-weight:900;color:var(--primary);">${finalScore}%</p>
          <p style="font-size:1.8rem;font-weight:700;margin:15px 0;">${label}</p>
          <p style="color:#64748b;">أجبت على ${score} من ${selectedQuestions.length} أسئلة</p>
          <button class="btn btn-primary btn-lg" onclick="closeQuiz()" style="margin-top:20px;">✅ تم</button>
        </div>
      `;
      
      await updateAverageScore();
      const scoreEl = document.getElementById('sectionPageScore');
      if (scoreEl) scoreEl.textContent = `${scoreLabel(finalScore)} (${finalScore}%)`;
    }

    showQuestion();
  };

  window.closeQuiz = () => {
    quizActive = false;
    window._currentQuestionData = null;
    document.getElementById('quizModal').classList.add('hidden');
    document.body.style.overflow = '';
  };

  function shuffleArray(a) { const arr = [...a]; for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
  function escapeHTML(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function escapeQuotes(s) { return s ? s.replace(/'/g, "\\'").replace(/"/g, '&quot;') : ''; }

  async function loadPosts(searchTerm = '') {
    const container = document.getElementById('postsContainer');
    container.innerHTML = '<p class="no-posts">⏳ جاري التحميل...</p>';
    const snap = await getDocs(query(collection(db, 'sections', currentSectionId, 'posts'), orderBy('createdAt', 'desc')));
    container.innerHTML = '';
    if (snap.empty) { container.innerHTML = '<p class="no-posts">📭 لا توجد منشورات بعد.</p>'; return; }
    let hasResults = false;
    snap.forEach(docSnap => {
      const p = docSnap.data();
      if (searchTerm && !`${p.word1} ${p.word2} ${p.translation} ${p.example}`.toLowerCase().includes(searchTerm.toLowerCase())) return;
      hasResults = true;
      const postId = docSnap.id;
      const postDiv = document.createElement('div');
      postDiv.className = 'post';
      postDiv.setAttribute('data-post-id', postId);
      postDiv.style.fontSize = '18px';
    
const word2HTML = (p.word2 && p.word2.trim()) ? `
        <span class="word-separator">/</span>
        <div class="post-word">${escapeHTML(p.word2)} <button class="speak-btn" onclick="event.stopPropagation(); speakWord('${escapeQuotes(p.word2)}')">🔊</button></div>
      ` : '';

      const exampleSpeakBtn = p.example ? ` <button class="speak-btn" onclick="event.stopPropagation(); speakWord('${escapeQuotes(p.example)}')" style="width:40px;height:40px;font-size:1.1rem;">🔊</button>` : '';

      let mediaHTML = '';
      if (p.mediaType === 'image' && p.mediaUrl) {
        mediaHTML = `
          <div class="post-media-container">
            <span class="media-type-badge badge-image">🖼️ صورة</span>
            <br>
            <img class="post-image" src="${p.mediaUrl}" alt="صورة المنشور" 
                 onclick="openLightbox('${p.mediaUrl}')" 
                 onerror="this.style.display='none'; this.parentElement.querySelector('.media-type-badge').style.display='none';">
          </div>`;
      } else if (p.mediaType === 'video' && p.mediaUrl) {
        const videoId = getYouTubeId(p.mediaUrl);
        if (videoId) {
          mediaHTML = `
            <div class="post-media-container">
              <span class="media-type-badge badge-video">🎬 فيديو</span>
              <div class="post-video-container">
                <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen></iframe>
              </div>
            </div>`;
        }
      }

      postDiv.innerHTML = `
        <div class="post-words-row">
          <div class="post-word">${escapeHTML(p.word1)} <button class="speak-btn" onclick="event.stopPropagation(); speakWord('${escapeQuotes(p.word1)}')">🔊</button></div>
          ${word2HTML}
        </div>
        <div class="post-translation">📖 ${escapeHTML(p.translation)}</div>
        ${mediaHTML}
        <div class="post-example-box">
          <div class="post-example-text"><span>💬 ${escapeHTML(p.example)}</span>${exampleSpeakBtn}</div>
          <div class="post-example-trans">🔁 ${escapeHTML(p.exampleTranslation)}</div>
        </div>
        <div class="post-actions">
          <div class="font-control">
            <button onclick="changeFontSize('${postId}', -2)">A-</button>
            <input type="range" min="14" max="100" value="18" oninput="setFontSize('${postId}', this.value)">
            <button onclick="changeFontSize('${postId}', 2)">A+</button>
            <span class="font-size-label" id="fontLabel-${postId}">18</span>
          </div>
        </div>`;
      container.appendChild(postDiv);
    });
    if (!hasResults && searchTerm) container.innerHTML = '<p class="no-posts">🔍 لا توجد نتائج.</p>';
  }
window.updateSpeakSpeed = () => { if(window._currentRate!==undefined) window._currentRate=parseFloat(document.getElementById('speakSpeed').value); };
  window.speakWord = (text) => {
    if ('speechSynthesis' in window) {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = parseFloat(document.getElementById('speakSpeed')?.value) || 0.85;
      speechSynthesis.speak(u);
    }
  };

  window.changeFontSize = (postId, delta) => {
    const post = document.querySelector(`[data-post-id="${postId}"]`);
    const label = document.getElementById(`fontLabel-${postId}`);
    const slider = post?.querySelector('input[type="range"]');
    if (post && slider) {
      let ns = Math.max(14, Math.min(100, parseInt(slider.value) + delta));
      slider.value = ns;
      const w = post.querySelector('.post-word'), e = post.querySelector('.post-example-text');
      if (w) w.style.fontSize = ns + 'px';
      if (e) e.style.fontSize = ns + 'px';
      if (label) label.textContent = ns;
    }
  };

  window.setFontSize = (postId, size) => {
    const post = document.querySelector(`[data-post-id="${postId}"]`);
    const label = document.getElementById(`fontLabel-${postId}`);
    if (post) {
      const w = post.querySelector('.post-word'), e = post.querySelector('.post-example-text');
      if (w) w.style.fontSize = size + 'px';
      if (e) e.style.fontSize = size + 'px';
      if (label) label.textContent = size;
    }
  };

  window.searchPosts = () => loadPosts(document.getElementById('searchInput').value);
  
  window.logout = async () => { 
    if (confirm('تسجيل الخروج؟')) { 
      await signOut(auth);
    } 
  };
  
  document.getElementById('quizModal').addEventListener('click', function(e) { 
    if (e.target === this) closeQuiz(); 
  });

  document.getElementById('lightbox').addEventListener('click', function(e) { 
    if (e.target === this) closeLightbox(); 
  });

  console.log('✅ تم التهيئة - المنصة جاهزة للعمل مع دعم الصور والفيديوهات');
</script>
</body>
</html>
